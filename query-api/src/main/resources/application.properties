# Datasource — same PostgreSQL as the workbench
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgraphile_research
quarkus.datasource.username=postgraphile
quarkus.datasource.password=postgraphile

# Port 8081 to avoid conflict with PostGraphile on 5678
quarkus.http.port=8081

# jOOQ dialect
quarkus.jooq.dialect=POSTGRES

# SQL debug — logs final SQL with bind values inlined (human-readable)
query.show-sql=true

# Don't redirect root to Dev UI
quarkus.http.non-application-root-path=/q
quarkus.http.redirect-to-non-application-root-path=false

# ── Test profile ──
%test.quarkus.http.test-port=8083
%test.query.show-sql=false
